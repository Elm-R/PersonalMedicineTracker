spring.application.name=PersonalMedicineTracker

spring.config.import=optional:classpath:.env

# Use environment variables for sensitive info

spring.datasource.url=${MYSQL_DB_URL}
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA
# Use 'none' if database already exists with tables/data
spring.jpa.hibernate.ddl-auto=none

# Let Hibernate auto-detect the dialect (MySQL8 is auto-detected)
# Optional: specify updated dialect explicitly
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Show SQL statements in console for debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Enable Spring Data repositories
spring.data.jpa.repositories.enabled=true

